#
# This docker compose file runs the published MCP image from GHCR.
#
# Run with:
#
# $ docker compose up -d mcp
#
# Then configure the MCP client to connect to http://localhost:3000/mcp
#
services:
  mcp:
    image: ghcr.io/italia/dati-semantic-mcp:latest
    pull_policy: always
    container_name: schema-gov-it-mcp
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Optional: mount usage logs to persist them
    volumes:
      - ./logs:/app/logs
    # Environment variables
    environment:
      - NODE_ENV=production
      - MCP_TRANSPORT=sse
      - PORT=3000
      - HOST=0.0.0.0
